name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rpc_exchange_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d rpc_exchange_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/rpc_exchange_test?schema=public
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/rpc_exchange_test?schema=public
      JWT_SECRET: test-secret
      WEB_ORIGIN: http://localhost:4173

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npm run prisma:generate --workspace backend

      - name: Prisma migrate deploy
        run: npx prisma migrate deploy --schema backend/prisma/schema.prisma

      - name: Typecheck backend
        run: npm run typecheck --workspace backend

      - name: Build backend
        run: npm run build --workspace backend

      - name: Typecheck frontend
        run: npm run typecheck --workspace frontend

      - name: Build frontend
        run: npm run build --workspace frontend

      - name: Run backend critical tests
        run: npm run test:critical --workspace backend
